<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo monocromático — herdará cor do contexto para impressão/fundos coloridos -->
  <defs>
    <style>
      .logo-shape { fill: currentColor; }
    </style>
  </defs>
  <!-- Usando o mesmo outline do logo.svg -->
  <g class="logo-shape">
    <!-- Águia -->
    <path d="M 512 100 C 350 100 250 200 250 350 C 250 450 310 520 380 560 L 380 700 C 380 800 450 850 550 850 L 512 900 L 474 850 L 550 850 C 650 850 720 800 720 700 L 720 560 C 790 520 850 450 850 350 C 850 200 750 100 512 100 Z"/>
    <!-- Asas -->
    <path d="M 250 350 Q 100 320 50 420 Q 80 350 220 360 Z"/>
    <path d="M 774 350 Q 924 320 974 420 Q 944 350 804 360 Z"/>
    <!-- Texto "FONTES FIGUEIREDO / ADVOGADOS" -->
    <text x="512" y="950" font-family="serif" font-size="120" font-weight="bold" text-anchor="middle" letter-spacing="8">FONTES FIGUEIREDO</text>
    <text x="512" y="1050" font-family="serif" font-size="80" text-anchor="middle" letter-spacing="12">ADVOGADOS</text>
  </g>
</svg>
